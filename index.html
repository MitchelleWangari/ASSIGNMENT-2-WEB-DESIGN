<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        body {
            background-color: rgb(206, 128, 192);
            padding: 20px;
        }
        label {
            font-family: 'Times New Roman', Times, serif, sans-serif;
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <h1>Student Registration</h1>
    <form>
        <label for="firstName">First Name:</label><br>
        <input type="text" id="firstName" placeholder="First Name"><br><br>
        <label for="lastName">Last Name:</label><br>
        <input type="text" id="lastName" placeholder="Last Name"><br><br>
        <label for="studentId">Student ID:</label><br>
        <input type="text" id="studentId" placeholder="Student ID"><br><br>
        <label for="telephone">Telephone Number:</label><br>
        <input type="tel" id="telephone" placeholder="Telephone Number"><br><br>
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" placeholder="Email Address"><br><br>
        <input type="Submit">
    </form>
</body>
</html>
